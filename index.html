<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>我的個人網站</h1>
    </header>

    <main>

            <h2>關於我</h2>

            <p id="message" class="hidden"></p>
        </section>
    </main>

    <script src="script.js"></script>

</html>
